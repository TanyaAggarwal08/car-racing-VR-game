<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNTHWAVE RACER VR</title>
  <meta name="description" content="A retro synthwave VR car racing game. Flashscreen entry point." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #04000f;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ---- Animated synthwave grid ---- */
    .grid-floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55vh;
      perspective: 350px;
      perspective-origin: 50% 0%;
      z-index: 0;
    }

    .grid-inner {
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255, 0, 200, 0.18) 39px, rgba(255, 0, 200, 0.18) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255, 0, 200, 0.18) 39px, rgba(255, 0, 200, 0.18) 40px);
      transform: rotateX(55deg) scale(1, 5) translateY(-20%);
      background-size: 80px 80px;
      animation: gridScroll 1.5s linear infinite;
    }

    @keyframes gridScroll {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 0 80px;
      }
    }

    /* ---- Sky gradient ---- */
    .sky {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 55vh;
      background: linear-gradient(180deg, #0a0033 0%, #2d0055 35%, #8c0044 70%, #cc3300 90%, #ff6600 100%);
      z-index: 0;
    }

    /* ---- Sun ---- */
    .sun {
      position: fixed;
      left: 50%;
      top: 22%;
      transform: translateX(-50%);
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffff00 0%, #ff8800 40%, #ff2200 100%);
      box-shadow: 0 0 60px #ff8800, 0 0 130px rgba(255, 100, 0, 0.4);
      z-index: 1;
      animation: sunPulse 3s ease-in-out infinite alternate;
      overflow: hidden;
    }

    .sun-lines span {
      display: block;
      height: 6px;
      background: rgba(0, 0, 0, 0.25);
      margin: 9px 0;
    }

    @keyframes sunPulse {
      from {
        box-shadow: 0 0 50px #ff8800, 0 0 100px rgba(255, 100, 0, 0.3);
      }

      to {
        box-shadow: 0 0 80px #ff4400, 0 0 200px rgba(255, 80, 0, 0.5);
      }
    }

    /* ---- Content wrapper ---- */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: -80px;
    }

    /* ---- Title ---- */
    .title {
      font-size: clamp(1.6em, 5vw, 3.2em);
      line-height: 1.4;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #ffee00 30%, #ff6600 60%, #ff00aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(255, 100, 0, 0.8));
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        filter: drop-shadow(0 0 12px rgba(255, 100, 0, 0.7));
      }

      to {
        filter: drop-shadow(0 0 28px rgba(255, 0, 170, 0.9));
      }
    }

    .subtitle {
      color: #00ffff;
      font-size: clamp(0.45em, 1.5vw, 0.7em);
      letter-spacing: 6px;
      text-shadow: 0 0 12px #00ffff;
      margin-top: 10px;
      animation: blink 1.8s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.2;
      }
    }

    /* ---- Credentials ---- */
    .creds {
      margin-top: 28px;
      text-align: center;
      color: #ff00aa;
      font-size: clamp(0.35em, 1vw, 0.5em);
      line-height: 2.2;
      text-shadow: 0 0 8px #ff00aa;
      border: 1px solid rgba(255, 0, 170, 0.3);
      padding: 14px 24px;
      background: rgba(0, 0, 0, 0.5);
    }

    /* ---- Buttons ---- */
    .btn-group {
      display: flex;
      gap: 18px;
      margin-top: 30px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s;
    }

    .btn-group.visible {
      opacity: 1;
    }

    .btn {
      font-family: 'Press Start 2P', monospace;
      padding: 13px 24px;
      font-size: clamp(0.4em, 1.5vw, 0.65em);
      border: 2px solid;
      cursor: pointer;
      background: transparent;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
    }

    .btn-start {
      color: #00ffff;
      border-color: #00ffff;
      box-shadow: 0 0 10px #00ffff, inset 0 0 8px rgba(0, 255, 255, 0.05);
    }

    .btn-start:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 25px #00ffff;
    }

    .btn-manual {
      color: #ff00aa;
      border-color: #ff00aa;
      box-shadow: 0 0 10px #ff00aa, inset 0 0 8px rgba(255, 0, 170, 0.05);
    }

    .btn-manual:hover {
      background: #ff00aa;
      color: #000;
      box-shadow: 0 0 25px #ff00aa;
    }

    /* ---- Loading bar ---- */
    .loading {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
    }

    .load-label {
      font-size: 0.35em;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 6px;
    }

    .load-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 0, 170, 0.2);
    }

    .load-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b00, #ff00aa, #00ffff);
      animation: loadAnim 4s linear forwards;
    }

    @keyframes loadAnim {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    /* ---- Scanlines ---- */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px);
      pointer-events: none;
      z-index: 200;
    }

    /* ---- Version tag ---- */
    .version {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 0.28em;
      color: rgba(255, 255, 255, 0.2);
      z-index: 201;
    }
  </style>
</head>

<body>
  <div class="sky"></div>
  <div class="grid-floor">
    <div class="grid-inner"></div>
  </div>
  <div class="sun">
    <div class="sun-lines">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="scanlines"></div>

  <div class="content">
    <h1 class="title">SYNTHWAVE<br>RACER</h1>
    <div class="subtitle">◄ VR EDITION ►</div>

    <div class="creds">
      BY: Tanya Aggarwal<br>
      ID: 644373<br>
      COURSE: VIRTUAL REALITY &amp; GAMES<br>
      Trinity Western University
    </div>

    <div class="btn-group" id="btnGroup">
      <a href="setup.html" class="btn btn-start" id="btnStart">▶ START RACE</a>
      <a href="manual.html" class="btn btn-manual" id="btnManual">📖 MANUAL</a>
    </div>
  </div>

  <div class="loading">
    <div class="load-label">LOADING...</div>
    <div class="load-bar">
      <div class="load-fill"></div>
    </div>
  </div>
  <div class="version">v1.0 · SYNTHWAVE RACER VR</div>

  <script>
    // Show buttons after 3.5s
    setTimeout(() => { document.getElementById('btnGroup').classList.add('visible'); }, 3500);
    // Auto-advance after 9s
    setTimeout(() => { window.location.href = 'setup.html'; }, 9000);
  </script>
</body>

</html>
